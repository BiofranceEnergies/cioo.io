<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expertise Immobilière</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="appForm" class="no-print">
        <h1 class="main-title">🕵️‍♂️ Mon Audit Immo</h1>

        <div class="card">
            <h2>👤 Propriétaire & Projet</h2>
            <input type="text" id="vendeurName" placeholder="Nom du vendeur" oninput="saveData()">
            <input type="text" id="adresseBien" placeholder="Adresse du bien" oninput="saveData()">
            <textarea id="projetVendeur" rows="2" placeholder="Projet de vente..." oninput="saveData()"></textarea>
        </div>

        <div class="card">
            <h2>🔧 Technique & DPE</h2>
            <div class="grid-2">
                <select id="dpeEnergie" onchange="saveData()"><option value="-">DPE</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option></select>
                <select id="dpeClimat" onchange="saveData()"><option value="-">GES</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option></select>
            </div>
            <textarea id="notesTechniquesGales" rows="2" placeholder="Notes techniques (chauffage, toiture...)" oninput="saveData()"></textarea>
        </div>

        <div class="card module-habitable">
            <h2 class="blue-title">🏠 Surfaces Habitables</h2>
            <div id="habitableList"></div>
            <button class="add-btn blue" onclick="addRoom('habitable')">+ Ajouter une pièce de vie</button>
            <div class="subtotal">Total Habitable : <strong id="totalHabitable">0 m²</strong></div>
        </div>

        <div class="card module-annexe">
            <h2 class="orange-title">📦 Surfaces Annexes</h2>
            <div id="annexList"></div>
            <button class="add-btn orange" onclick="addRoom('annexe')">+ Ajouter une zone annexe</button>
            <div class="subtotal">Total Annexes : <strong id="totalAnnex">0 m²</strong></div>
        </div>

        <button class="print-btn" onclick="printReport()">🖨️ GÉNÉRER LE RAPPORT PDF</button>
        <button class="reset-btn" onclick="resetForm()">🗑️ Effacer l'audit en cours</button>
    </div>

    <div id="printableArea" class="only-print">
        <div class="report-header">
            <h1>RAPPORT D'EXPERTISE IMMOBILIÈRE</h1>
            <p id="p-date"></p>
        </div>
        <div id="p-content"></div>
        <div class="print-totals">
            <p>Surface Habitable : <strong id="p-total-hab"></strong></p>
            <p>Surface Annexes : <strong id="p-total-annex"></strong></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
