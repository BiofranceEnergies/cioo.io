<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospection BIENS - Propriété-Privée</title>
  <style>
    :root { --pp-orange: #f16529; --pp-dark: #333; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 15px; }
    .card { max-width: 550px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 6px solid var(--pp-orange); }
    h2 { text-align: center; color: var(--pp-dark); margin-bottom: 20px; }
    
    label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    
    .row { display: flex; gap: 10px; }
    .row div { flex: 1; }
    
    .calc-box { background: #fff8f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ffe0d1; }
    
    button { background: var(--pp-orange); color: white; border: none; padding: 16px; width: 100%; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    button:hover { background: #d45620; }
    
    #status { text-align: center; margin-top: 15px; font-weight: bold; }
    .pac-container { z-index: 10000 !important; } /* Pour que l'autocomplétion s'affiche bien */
  </style>
</head>
<body>

<div class="card">
  <h2>Fiche "BIENS" Propriété-Privée</h2>
  
  <form id="ppForm">
    <label>Nom du Prospect</label>
    <input type="text" name="nom" required>
    
    <div class="row">
      <div>
        <label>Téléphone</label>
        <input type="tel" name="telephone" required>
      </div>
      <div>
        <label>Email</label>
        <input type="email" name="email">
      </div>
    </div>

    <label>Adresse du bien (Autocomplete)</label>
    <input type="text" id="adresse_actuelle" name="adresse" placeholder="Saisissez l'adresse..." required>
    
    <div class="row">
      <div>
        <label>Code Postal</label>
        <input type="text" id="cp_actuel" name="cp" required>
      </div>
      <div>
        <label>Ville</label>
        <input type="text" id="ville_actuelle" name="ville" required>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Type de bien</label>
        <select name="type_bien">
          <option value="Maison">Maison</option>
          <option value="Appartement">Appartement</option>
          <option value="Terrain">Terrain</option>
        </select>
      </div>
      <div>
        <label>Projet</label>
        <select name="projet">
          <option value="Estimation">Estimation</option>
          <option value="Vente">Mandat de vente</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Surf. Habitable (m²)</label>
        <input type="number" id="surf_h" name="surface_habitable" step="0.01" required>
      </div>
      <div>
        <label>Surf. Terrain (m²)</label>
        <input type="number" name="surface_terrain" step="0.01">
      </div>
    </div>

    <div class="calc-box">
      <label>Prix de vente souhaité (€)</label>
      <input type="number" id="prix" name="prix_vente">
      
      <label style="margin-top:10px;">Prix au m² habitable</label>
      <input type="text" id="prix_m2" name="prix_m2" readonly style="background:#eee; font-weight:bold; color:var(--pp-orange);">
    </div>

    <label>Commentaires / Notes</label>
    <textarea name="commentaires" rows="3"></textarea>

    <button type="submit" id="btnEnvoi">ENREGISTRER AU TABLEAU</button>
  </form>
  
  <div id="status"></div>
</div>

<script>
  // FONCTION AUTOCOMPLETE (Copie conforme de ton code 1 qui marchait)
  function initAutocomplete() {
    let adresseInput = document.getElementById("adresse_actuelle");
    let autocomplete = new google.maps.places.Autocomplete(adresseInput, { 
      types: ["address"], 
      componentRestrictions: { country: "fr" } 
    });
    
    autocomplete.addListener("place_changed", function () {
      let place = autocomplete.getPlace();
      if (!place.address_components) return;

      let rue = "", numero = "", cp = "", ville = "";
      place.address_components.forEach(component => {
        if (component.types.includes("street_number")) numero = component.long_name;
        else if (component.types.includes("route")) rue = component.long_name;
        else if (component.types.includes("postal_code")) cp = component.long_name;
        else if (component.types.includes("locality")) ville = component.long_name;
      });

      document.getElementById("adresse_actuelle").value = (numero ? numero + " " : "") + rue;
      document.getElementById("cp_actuel").value = cp;
      document.getElementById("ville_actuelle").value = ville;
    });
  }

  // CALCUL PRIX AU M2
  const surfH = document.getElementById('surf_h');
  const prixV = document.getElementById('prix');
  const prixM2 = document.getElementById('prix_m2');

  function updateM2() {
    let s = parseFloat(surfH.value);
    let p = parseFloat(prixV.value);
    if (s > 0 && p > 0) {
      prixM2.value = Math.round(p / s) + " € / m²";
    } else {
      prixM2.value = "";
    }
  }
  surfH.addEventListener('input', updateM2);
  prixV.addEventListener('input', updateM2);

  // ENVOI VERS GOOGLE SHEETS
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzuWqH_Yco59DG8orfiQIJg0vfxzqY2zRXoejgZH8mpYQfaBPxEWkQx1_DRoJHFVzkh/exec';
  const form = document.getElementById('ppForm');

  form.addEventListener('submit', e => {
    e.preventDefault();
    document.getElementById('status').innerHTML = "⏳ Envoi en cours...";
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(res => {
        document.getElementById('status').innerHTML = "✅ Enregistré avec succès !";
        form.reset();
        prixM2.value = "";
      })
      .catch(err => {
        document.getElementById('status').innerHTML = "❌ Erreur d'envoi.";
      });
  });
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAPz59eSA-UkT2AzlQzXslwzt8V5uftFzM&libraries=places&callback=initAutocomplete" async defer></script>

</body>
</html>
