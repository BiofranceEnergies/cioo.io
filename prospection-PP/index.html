<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Prospection - Propriété-Privée</title>
  <style>
    :root { --pp-orange: #f16529; --pp-dark: #333; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; padding: 15px; }
    .card { max-width: 550px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--pp-orange); }
    h2 { text-align: center; color: var(--pp-dark); margin-bottom: 20px; }
    
    label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    
    /* Style pour les suggestions d'adresse */
    .autocomplete-res { border: 1px solid #ddd; background: white; position: absolute; width: 91%; max-height: 200px; overflow-y: auto; z-index: 1000; border-radius: 0 0 6px 6px; display: none; }
    .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
    .suggestion-item:hover { background-color: #f1f1f1; }

    .row { display: flex; gap: 10px; }
    .row div { flex: 1; }
    .highlight { background: #fff8f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ffe0d1; }
    button { background: var(--pp-orange); color: white; border: none; padding: 16px; width: 100%; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    #status { text-align: center; margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>

<div class="card">
  <h2>Fiche "BIENS" Propriété-Privée</h2>
  
  <form id="ppForm">
    <label>Nom du Prospect</label>
    <input type="text" name="nom" required>
    
    <div class="row">
      <div><label>Téléphone</label><input type="tel" name="telephone" required></div>
      <div><label>Email</label><input type="email" name="email"></div>
    </div>

    <div style="position: relative;">
      <label>Adresse du bien</label>
      <input type="text" id="adresse_input" name="adresse" autocomplete="off" placeholder="Tapez l'adresse..." required>
      <div id="suggestions" class="autocomplete-res"></div>
    </div>
    
    <div class="row">
      <div><label>CP</label><input type="text" id="cp" name="cp" required></div>
      <div><label>Ville</label><input type="text" id="ville" name="ville" required></div>
    </div>

    <div class="row">
      <div>
        <label>Type de bien</label>
        <select name="type_bien">
          <option value="Maison">Maison</option>
          <option value="Appartement">Appartement</option>
          <option value="Terrain">Terrain</option>
        </select>
      </div>
      <div>
        <label>Projet</label>
        <select name="projet">
          <option value="Estimation">Estimation</option>
          <option value="Vente">Mandat</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div><label>Habitable (m²)</label><input type="number" id="surf_h" name="surface_habitable" step="0.01" required></div>
      <div><label>Terrain (m²)</label><input type="number" name="surface_terrain" step="0.01"></div>
    </div>

    <div class="highlight">
      <label>Prix de vente souhaité (€)</label>
      <input type="number" id="prix" name="prix_vente">
      <label>Prix au m² habitable</label>
      <input type="text" id="prix_m2" name="prix_m2" readonly style="background:#eee;">
    </div>

    <label>Commentaires</label>
    <textarea name="commentaires" rows="3"></textarea>

    <button type="submit">ENREGISTRER DANS LE TABLEAU</button>
  </form>
  <div id="status"></div>
</div>

<script>
  // --- 1. AUTOCOMPLETION SANS GOOGLE (API GOUV) ---
  const addrInput = document.getElementById('adresse_input');
  const suggestionsBox = document.getElementById('suggestions');

  addrInput.addEventListener('input', function() {
    let val = this.value;
    if (val.length < 5) { suggestionsBox.style.display = 'none'; return; }

    fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(val)}&limit=5`)
      .then(res => res.json())
      .then(data => {
        suggestionsBox.innerHTML = '';
        if (data.features.length > 0) {
          suggestionsBox.style.display = 'block';
          data.features.forEach(feature => {
            let div = document.createElement('div');
            div.className = 'suggestion-item';
            div.innerText = feature.properties.label;
            div.onclick = function() {
              addrInput.value = feature.properties.name; // Rue seule
              document.getElementById('cp').value = feature.properties.postcode;
              document.getElementById('ville').value = feature.properties.city;
              suggestionsBox.style.display = 'none';
            };
            suggestionsBox.appendChild(div);
          });
        }
      });
  });

  // Fermer les suggestions si on clique ailleurs
  document.addEventListener('click', (e) => { if (e.target !== addrInput) suggestionsBox.style.display = 'none'; });

  // --- 2. CALCUL PRIX AU M2 ---
  const surfH = document.getElementById('surf_h');
  const prixV = document.getElementById('prix');
  const prixM2 = document.getElementById('prix_m2');

  function updateM2() {
    let s = parseFloat(surfH.value); let p = parseFloat(prixV.value);
    if (s > 0 && p > 0) prixM2.value = Math.round(p / s) + " € / m²";
    else prixM2.value = "";
  }
  surfH.addEventListener('input', updateM2);
  prixV.addEventListener('input', updateM2);

  // --- 3. ENVOI VERS GOOGLE SHEETS ---
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzuWqH_Yco59DG8orfiQIJg0vfxzqY2zRXoejgZH8mpYQfaBPxEWkQx1_DRoJHFVzkh/exec';
  const form = document.getElementById('ppForm');

  form.addEventListener('submit', e => {
    e.preventDefault();
    document.getElementById('status').innerHTML = "⏳ Envoi en cours...";
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(res => {
        document.getElementById('status').innerHTML = "✅ Enregistré avec succès !";
        form.reset();
        prixM2.value = "";
      })
      .catch(err => {
        document.getElementById('status').innerHTML = "❌ Erreur de connexion.";
      });
  });
</script>

</body>
</html>
