<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospection BIENS - Propriété-Privée</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>Fiche BIENS - Propriété-Privée</h2>
    
    <form id="ppForm">
        <div class="section-title">CONTACT</div>
        <input type="text" name="nom" placeholder="Nom du prospect" required>
        <div class="row">
            <input type="tel" name="telephone" placeholder="Téléphone" required>
            <input type="email" name="email" placeholder="Email">
        </div>

        <div class="section-title">ADRESSE DU BIEN</div>
        <div class="autocomplete-wrapper">
            <input type="text" id="adresse_input" name="adresse" autocomplete="off" placeholder="Commencez à taper l'adresse..." required>
            <div id="suggestions" class="autocomplete-res"></div>
        </div>
        <div class="row">
            <input type="text" id="cp" name="cp" placeholder="Code Postal" required>
            <input type="text" id="ville" name="ville" placeholder="Ville" required>
        </div>

        <div class="section-title">DÉTAILS & PRIX</div>
        <div class="row">
            <select name="type_bien">
                <option value="Maison">Maison</option>
                <option value="Appartement">Appartement</option>
            </select>
            <select name="projet">
                <option value="Estimation">Estimation</option>
                <option value="Vente">Mandat</option>
            </select>
        </div>
        <div class="row">
            <input type="number" id="surf_h" name="surface_habitable" step="0.01" placeholder="Surface Hab. (m²)" required>
            <input type="number" name="surface_terrain" step="0.01" placeholder="Terrain (m²)">
        </div>

        <div class="price-box">
            <input type="number" id="prix" name="prix_vente" placeholder="Prix de vente souhaité (€)">
            <input type="text" id="prix_m2" name="prix_m2" readonly placeholder="Prix au m² (Auto)">
        </div>

        <div class="section-title">PHOTO & NOTES</div>
        <input type="file" id="photo_file" accept="image/*" capture="environment">
        <textarea name="commentaires" rows="3" placeholder="Notes (DPE, état, travaux...)"></textarea>

        <button type="submit" id="submitBtn">ENREGISTRER AU TABLEAU</button>
    </form>
    <div id="status"></div>
</div>

<script src="script.js"></script>
</body>
</html>
