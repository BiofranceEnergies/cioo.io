<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - Sylvain Matignon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a1128;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        h1 {
            color: #ed1651;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            color: #cbd5e1;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 14px 28px;
            background-color: #ed1651;
            color: white;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #d01146;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Merci pour votre demande ! ✨</h1>
        <p>Votre message a bien été transmis. Je l'analyse avec la plus grande attention et je vous recontacte très rapidement pour planifier votre étude de valeur.</p>
        <a href="index.html" class="btn">Retour au site</a>
    </div>
</body>
</html>
